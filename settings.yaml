# LakeWind configuration — all configurable values. Nothing hardcoded in code.
# Spec ref: LakeWind Technical Specification v2.0, Section 10.

project:
  name: "LakeWind"
  version: "0.1.0"
  timezone: "Europe/Rome"

# Section 2.1 — operating area bounding box (Dongo-Dervio corridor)
operating_area:
  name: "Dongo-Dervio corridor"
  lat_min: 46.05
  lat_max: 46.16
  lon_min: 9.26
  lon_max: 9.34

# Section 2.2 — virtual observation points
# V4 FIX: Cut from 15 to 8 operational points. The V3 expansion to 15 included
# shore/offshore pairs within 1-2km of each other — below the resolution of
# every NWP model (icon_d2 is 2.2km, all others are >=6km). The pairs received
# IDENTICAL forecasts, doubling API calls for zero skill gain.
# Plus 4 auxiliary points for macro-area pressure gradients.
virtual_points:
  # --- Operational points (8) — coordinates validated by scripts/validate_points.py ---
  # V5 FIX: Dervio and Bellano were 1.5-1.7km off. All coordinates now validated
  # against the Lake Como water polygon to ensure they sit on water, not mountainside.
  - {id: dongo_shore,       lat: 46.1230, lon: 9.2850}   # on water, near Dongo
  - {id: gravedona_shore,   lat: 46.1460, lon: 9.3050}   # on water, Gravedona bay
  - {id: domaso_offshore,   lat: 46.1500, lon: 9.3230}   # on water, off Domaso
  - {id: mid_channel,       lat: 46.1000, lon: 9.3040}   # mid-lake
  - {id: piona_entrance,    lat: 46.1140, lon: 9.3100}   # on water, Piona entrance
  - {id: dervio_shore,      lat: 46.0763, lon: 9.2980}   # V5 FIX: on water, off Dervio
  - {id: bellano_offshore,  lat: 46.0550, lon: 9.3000}   # V5 FIX: on water, off Bellano
  # --- Auxiliary points (4) — macro-area pressure gradients ---
  - {id: zurich,          lat: 47.376, lon: 8.541}
  - {id: milano_linate,   lat: 45.445, lon: 9.278}
  - {id: sondrio,         lat: 46.170, lon: 9.870}
  - {id: lugano,          lat: 46.005, lon: 8.952}

# Operational virtual points (8) — used by prediction engine + Telegram
operational_point_ids:
  - dongo_shore
  - gravedona_shore
  - domaso_offshore
  - mid_channel
  - piona_entrance
  - dervio_shore
  - bellano_offshore

# Section 4.3 — Open-Meteo multi-model NWP
open_meteo:
  base_url: "https://api.open-meteo.com/v1/forecast"
  ensemble_url: "https://ensemble-api.open-meteo.com/v1/ensemble"
  historical_url: "https://archive-api.open-meteo.com/v1/archive"
  historical_forecast_url: "https://historical-forecast-api.open-meteo.com/v1/forecast"
  previous_runs_url: "https://previous-runs-api.open-meteo.com/v1/forecast"
  # Verify slugs against https://open-meteo.com/en/docs before each release.
  models:
    - icon_d2
    - icon_eu
    - ecmwf_ifs025
    - gfs_seamless
    - italia_meteo_arpae_icon_2i
  ensemble_models:
    - icon_seamless
    - gfs_seamless
    - ecmwf_ifs025
  hourly_vars:
    - wind_speed_10m
    - wind_direction_10m
    - wind_gusts_10m
    - wind_speed_80m           # multi-level wind (wind shear features)
    - wind_direction_80m
    - wind_speed_120m
    - wind_direction_120m
    - temperature_2m
    - dew_point_2m
    - relative_humidity_2m
    - pressure_msl
    - surface_pressure
    - cloud_cover
    - cloud_cover_low
    - cloud_cover_mid
    - cloud_cover_high
    - shortwave_radiation
    - cape
    - boundary_layer_height
    - precipitation             # V5: rain (mm/h) — for weather display + wet-sail warning
    - rain                     # V5: rain specifically (mm/h)
    - snowfall                 # V5: snowfall (cm/h) — winter sailing safety
    - weather_code             # V5: WMO weather code (0=clear, 61=light rain, etc.)
    - visibility               # V5: visibility (m) — safety feature
    - uv_index                 # V5: UV index — sunburn warning for sailors
    # V6.2: Upper-air features (windmojo-inspired)
    - wind_speed_850hPa        # wind at ~1500m (boundary layer top)
    - wind_direction_850hPa
    - temperature_850hPa       # cold-air advection indicator
    - geopotential_height_500hPa  # mid-troposphere (trough/ridge)
    - wind_speed_500hPa        # steering level for storms
    - wind_direction_500hPa
  wind_speed_unit: "kn"
  timezone: "auto"
  forecast_days: 7
  # Backfill config (Spec §4.3 Historical Forecast API)
  backfill:
    # Max days per request (Open-Meteo allows up to ~90 days)
    chunk_days: 90
    # Polite delay between requests (seconds)
    delay_seconds: 1.0
    # Default backfill window for new deployments
    default_days: 3650  # 10 years — enough for climatology, recent enough for climate change

# Section 4.4 — physical predictor points (Zurich & Milano Linate for Foehn gradient)
pressure_gradient:
  zurich:    {lat: 47.376, lon: 8.541}
  milano_linate: {lat: 45.445, lon: 9.278}
  foehn_likely_hpa: 8.0
  foehn_strong_hpa: 12.0

# Section 4.4 — local thermal wind timing rules (Breva/Tivano)
local_winds:
  tivano_die_window: {start: "08:30", end: "09:30"}
  breva_build_window: {start: "10:30", end: "11:00"}

# Section 4.2 — ground station scrapers
domaso:
  url: "https://www.nauticadomaso.it/it/Meteo-Webcam"
  fallback_url: "https://www.domaso.it/it/METEO%20WEBCAM"

cml:
  url: "https://www.centrometeolombardo.com/temporeale.php"

arpa_lombardia:
  # Spec note: query station registry by bounding box at runtime; do not hardcode station IDs.
  base_url: "https://www.dati.lombardia.it/resource"
  sensor_dataset: "647i-nhxk"
  station_dataset: "nf78-nj6b"
  # Bounding-box expansion (deg) around operating_area when discovering stations.
  bbox_padding_deg: 0.15
  # Default rate-limit guidance: be polite, no key required for low volume.
  app_token_env: "ARPA_APP_TOKEN"

# Section 4.1 — DIY buoy ingestion endpoint (Phase 3 — disabled until hardware exists)
diy_buoy:
  enabled: false
  ingestion_url: "http://localhost:8080/buoy"
  source_id: "diy_buoy"

# Section 7.1 — LightGBM quantile MOS model
model:
  feature_set_version: "v1"
  # Backend: "lightgbm" (default, CPU) or "xgboost_gpu" (RTX 3070).
  # XGBoost GPU is much faster for large datasets and walk-forward backtests
  # with many windows. Auto-falls back to CPU if no GPU is present.
  backend: "xgboost_gpu"
  target_u: "bias_u"      # observed_u - forecast_u
  target_v: "bias_v"
  quantiles: [0.1, 0.5, 0.9]
  lgbm_params:
    objective: "quantile"
    metric: "quantile"
    num_leaves: 63
    learning_rate: 0.05
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
    min_data_in_leaf: 30
    verbose: -1
    num_iterations: 500
  # Section 7.2 — upgrade gate. Do not add a second model unless these are met.
  upgrade_gate:
    min_mae_improvement_kn: 0.2
    min_dir_improvement_deg: 5.0
  # Section 7.3 — walk-forward validation
  walk_forward:
    train_window_days: 60
    test_window_days: 14
    step_days: 7
    min_train_samples: 200

# Section 1.2 — success criteria thresholds (for backtest reports)
success_criteria:
  mae_reduction_vs_raw_nwp_pct: 15.0
  mae_reduction_vs_persistence_pct: 25.0
  dir_error_reduction_pct: 20.0
  confidence_interval_target_pct: 75.0
  decision_precision_pct: 80.0

# Section 8 — operational pipeline
pipeline:
  target_runtime_seconds: 10
  degrade_confidence_per_missing_nwp: 5.0   # percentage points
  degrade_confidence_per_missing_station: 3.0

# Section 9 — interfaces
telegram:
  enabled: true
  token_env: "TELEGRAM_BOT_TOKEN"
  allowed_user_ids: []   # empty = open; populate to restrict

streamlit:
  port: 8501
  title: "LakeWind — Dongo-Dervio"

# Section 11 — scheduler (Phase 0 cron-like behavior)
schedule:
  collectors_nwp_minutes: 30        # Open-Meteo every 30 min
  collectors_stations_minutes: 10   # ground stations every 10 min
  predict_minutes: 30
  backtest_cron: "0 4 * * *"        # daily at 04:00 Europe/Rome

# Database
db:
  path: "data/lakewind.duckdb"
  features_table: "features"
  forecast_table: "forecast_runs"
  observations_table: "observations"
  predictions_table: "predictions"
  model_registry_table: "model_registry"
  sailing_log_table: "sailing_log"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
